<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1c1f">
<title>Calculator</title>
<style>
  @import url('https://cdnjs.cloudflare.com/ajax/libs/jetbrains-mono/2.304/JetBrainsMono.min.css');

  :root{
    --body-graphite:#2b2b30;
    --panel-charcoal:#1c1c1f;
    --display-bg:#0d1410;
    --display-fg:#7fffa0;
    --display-fg-dim:#3c6b4c;
    --key-digit:#3a3a40;
    --key-digit-hover:#45454c;
    --key-func:#56565e;
    --key-func-hover:#63636b;
    --key-op:#ff8a3d;
    --key-op-hover:#ffa05c;
    --hairline:#454550;
    --shadow-deep: rgba(0,0,0,0.55);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    height:100%;
    width:100%;
    margin:0;
    overflow:hidden;
    background:#15151a;
    font-family:'Inter', system-ui, -apple-system, sans-serif;
    touch-action:none; /* block pinch-zoom / pull-to-refresh, app-like feel */
  }

  .calc{
    height:100%;
    width:100%;
    display:flex;
    flex-direction:column;
    background:linear-gradient(170deg, #34343a 0%, var(--body-graphite) 35%, #1f1f23 100%);
    padding:
      calc(var(--safe-top) + 18px)
      18px
      calc(var(--safe-bottom) + 18px);
    position:relative;
  }

  .calc::before{
    /* faint top sheen to sell the "instrument" body */
    content:"";
    position:absolute;
    top:var(--safe-top); left:14px; right:14px; height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
  }

  .brand{
    display:flex;
    justify-content:center;
    align-items:baseline;
    padding:2px 6px 16px;
    color:#8a8a92;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    flex-shrink:0;
  }
  .brand span{ color:#8a8a92; }

  .display-panel{
    background:var(--panel-charcoal);
    border-radius:20px;
    padding:10px;
    margin-bottom:20px;
    box-shadow:
      inset 0 2px 6px rgba(0,0,0,0.6),
      inset 0 0 0 1px rgba(0,0,0,0.5);
    flex:1 1 auto;
    display:flex;
    min-height:0;
  }

  .display{
    background:
      linear-gradient(180deg, rgba(255,255,255,0.02), transparent 40%),
      var(--display-bg);
    border-radius:14px;
    padding:18px 22px;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:flex-end;
    overflow:hidden;
    position:relative;
    box-shadow: inset 0 0 18px rgba(0,0,0,0.5);
  }

  /* faint scanlines for the phosphor-display feel */
  .display::after{
    content:"";
    position:absolute; inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.12) 3px
    );
    pointer-events:none;
  }

  .expression{
    font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:clamp(14px, 4vw, 18px);
    color:var(--display-fg-dim);
    letter-spacing:0.02em;
    min-height:22px;
    margin-bottom:8px;
    text-shadow:0 0 6px rgba(127,255,160,0.15);
    word-break:break-all;
    text-align:right;
    width:100%;
  }

  .result{
    font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:clamp(40px, 13vw, 64px);
    font-weight:500;
    color:var(--display-fg);
    text-shadow:0 0 16px rgba(127,255,160,0.55), 0 0 2px rgba(127,255,160,0.8);
    line-height:1;
    width:100%;
    text-align:right;
    white-space:nowrap;
    overflow:hidden;
    transition:opacity 0.08s ease;
  }

  .keys{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    grid-template-rows:repeat(5, 1fr);
    gap:12px;
    flex:0 0 auto;
    height:58%;
  }

  button{
    border:none;
    outline:none;
    font-family:'Inter', system-ui, sans-serif;
    font-size:clamp(20px, 6vw, 26px);
    font-weight:600;
    color:#ececef;
    padding:0;
    border-radius:50%;
    cursor:pointer;
    position:relative;
    background:var(--key-digit);
    box-shadow:
      0 4px 0 rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.08);
    transition:transform 0.05s ease, box-shadow 0.05s ease, background 0.15s ease;
    width:100%;
    height:100%;
  }
  button:hover{ background:var(--key-digit-hover); }

  button:active,
  button.pressed{
    transform:translateY(3px) scale(0.97);
    box-shadow:
      0 0px 0 rgba(0,0,0,0.35),
      inset 0 2px 4px rgba(0,0,0,0.4);
  }

  button.func{ background:var(--key-func); font-size:clamp(18px, 5.5vw, 22px); }
  button.func:hover{ background:var(--key-func-hover); }

  button.op{
    background:var(--key-op);
    color:#241200;
  }
  button.op:hover{ background:var(--key-op-hover); }

  button.zero{
    grid-column:span 2;
    border-radius:36px;
  }

  button.equals{
    background:linear-gradient(160deg, #ffa55c, var(--key-op));
    color:#241200;
    grid-row: span 2;
    border-radius:36px;
  }

  /* glow ping on the just-pressed key, for the "lit key" signature touch */
  button::after{
    content:"";
    position:absolute; inset:0;
    border-radius:inherit;
    opacity:0;
    background:radial-gradient(circle, rgba(255,255,255,0.35), transparent 70%);
    transition:opacity 0.35s ease;
    pointer-events:none;
  }
  button.ping::after{
    opacity:1;
    transition:opacity 0s;
  }

  button:focus-visible{
    box-shadow:
      0 4px 0 rgba(0,0,0,0.35),
      inset 0 1px 0 rgba(255,255,255,0.08),
      0 0 0 3px var(--display-fg);
  }

  @media (prefers-reduced-motion: reduce){
    button{ transition:none; }
  }

  /* short / squat phones: ease off the display flex ratio so keys stay full size */
  @media (max-aspect-ratio: 1/2){
    .display-panel{ flex:0 1 180px; }
  }
</style>
</head>
<body>

<div class="calc">
  <div class="brand"><span>Anshu Kumar</span></div>

  <div class="display-panel">
    <div class="display">
      <div class="expression" id="expression">&nbsp;</div>
      <div class="result" id="result">0</div>
    </div>
  </div>

  <div class="keys">
    <button class="func" data-action="clear">C</button>
    <button class="func" data-action="negate">±</button>
    <button class="func" data-action="percent">%</button>
    <button class="op" data-action="divide">÷</button>

    <button data-action="digit" data-value="7">7</button>
    <button data-action="digit" data-value="8">8</button>
    <button data-action="digit" data-value="9">9</button>
    <button class="op" data-action="multiply">×</button>

    <button data-action="digit" data-value="4">4</button>
    <button data-action="digit" data-value="5">5</button>
    <button data-action="digit" data-value="6">6</button>
    <button class="op" data-action="subtract">−</button>

    <button data-action="digit" data-value="1">1</button>
    <button data-action="digit" data-value="2">2</button>
    <button data-action="digit" data-value="3">3</button>
    <button class="op" data-action="add">+</button>

    <button class="zero" data-action="digit" data-value="0">0</button>
    <button data-action="decimal">.</button>
    <button class="equals op" data-action="equals">=</button>
  </div>
</div>

<script>
(function(){
  const resultEl = document.getElementById('result');
  const exprEl = document.getElementById('expression');

  // Calculator state
  let current = '0';        // value currently being typed / shown
  let previous = null;      // first operand, once an operator is chosen
  let operator = null;      // pending operator: + - * /
  let justEvaluated = false; // true right after "=" was pressed

  const OP_SYMBOLS = { add:'+', subtract:'−', multiply:'×', divide:'÷' };

  function formatNumber(numStr){
    if (numStr === 'Error') return numStr;
    const num = Number(numStr);
    if (!isFinite(num)) return 'Error';

    // Trim to a sane number of significant digits so it fits the display
    let str = num.toString();
    if (str.length > 12){
      str = num.toPrecision(10).toString();
      if (str.includes('.')) {
        str = str.replace(/0+$/,'').replace(/\.$/,'');
      }
      if (Number(str).toString().length <= 12) str = Number(str).toString();
    }
    return str;
  }

  function updateDisplay(){
    resultEl.textContent = formatNumber(current);

    if (operator && previous !== null){
      exprEl.textContent = `${formatNumber(previous)} ${OP_SYMBOLS[operator]}`;
    } else {
      exprEl.textContent = '\u00A0';
    }
  }

  function inputDigit(d){
    if (justEvaluated){
      current = d;
      justEvaluated = false;
      return;
    }
    if (current === '0'){
      current = d;
    } else if (current.replace('-','').length < 12) {
      current += d;
    }
  }

  function inputDecimal(){
    if (justEvaluated){
      current = '0.';
      justEvaluated = false;
      return;
    }
    if (!current.includes('.')) current += '.';
  }

  function clearAll(){
    current = '0';
    previous = null;
    operator = null;
    justEvaluated = false;
  }

  function negate(){
    if (current === '0') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
  }

  function percent(){
    current = (parseFloat(current) / 100).toString();
  }

  function compute(a, b, op){
    a = parseFloat(a);
    b = parseFloat(b);
    switch(op){
      case 'add': return a + b;
      case 'subtract': return a - b;
      case 'multiply': return a * b;
      case 'divide': return b === 0 ? NaN : a / b;
      default: return b;
    }
  }

  function chooseOperator(op){
    if (operator && !justEvaluated && previous !== null){
      const outcome = compute(previous, current, operator);
      previous = isFinite(outcome) ? outcome.toString() : 'Error';
      current = previous;
    } else {
      previous = current;
    }
    operator = op;
    justEvaluated = false;
    current = '0';
  }

  function equals(){
    if (operator === null || previous === null) return;
    const outcome = compute(previous, current, operator);
    current = isFinite(outcome) ? outcome.toString() : 'Error';
    previous = null;
    operator = null;
    justEvaluated = true;
  }

  function flashPing(button){
    button.classList.add('ping');
    setTimeout(() => button.classList.remove('ping'), 220);
  }

  function handleAction(button){
    const action = button.dataset.action;

    if (action === 'digit'){
      inputDigit(button.dataset.value);
    } else if (action === 'decimal'){
      inputDecimal();
    } else if (action === 'clear'){
      clearAll();
    } else if (action === 'negate'){
      negate();
    } else if (action === 'percent'){
      percent();
    } else if (['add','subtract','multiply','divide'].indexOf(action) !== -1){
      chooseOperator(action);
    } else if (action === 'equals'){
      equals();
    }

    if (current === 'Error'){
      previous = null;
      operator = null;
    }

    updateDisplay();
    flashPing(button);
  }

  // Wire up every button — both touch and click, since touchstart fires faster on Android
  const buttons = document.querySelectorAll('.keys button');
  for (let i = 0; i < buttons.length; i++){
    const btn = buttons[i];
    let touched = false;

    btn.addEventListener('touchstart', function(e){
      touched = true;
      handleAction(btn);
    }, { passive:true });

    btn.addEventListener('click', function(){
      if (touched){ touched = false; return; } // avoid double-fire after touchstart
      handleAction(btn);
    });
  }

  // Keyboard support (useful if a bluetooth keyboard is attached)
  const KEY_MAP = {
    '+':'add', '-':'subtract', '*':'multiply', '/':'divide',
    'Enter':'equals', '=':'equals', 'Escape':'clear', '%':'percent'
  };

  document.addEventListener('keydown', (e) => {
    let matchedButton = null;

    if (/^[0-9]$/.test(e.key)){
      matchedButton = document.querySelector(`button[data-value="${e.key}"]`);
    } else if (e.key === '.'){
      matchedButton = document.querySelector('button[data-action="decimal"]');
    } else if (KEY_MAP[e.key]){
      matchedButton = document.querySelector(`button[data-action="${KEY_MAP[e.key]}"]`);
    }

    if (matchedButton){
      e.preventDefault();
      handleAction(matchedButton);
    }
  });

  updateDisplay();
})();
</script>

</body>
</html>
